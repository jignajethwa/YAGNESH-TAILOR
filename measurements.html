<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Customer Measurement Form</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        form { max-width: 400px; margin: auto; }\n        label { display: block; margin-bottom: 8px; }\n        input[type='text'], input[type='number'] { width: 100%; margin-bottom: 16px; padding: 8px; }\n        input[type='submit'] { background-color: #4CAF50; color: white; border: none; padding: 10px 15px; cursor: pointer; }\n    </style>\n</head>\n<body>\n    <h1>Customer Measurement Form</h1>\n    <form action="#" method="post">\n        <label for="name">Name:</label>\n        <input type="text" id="name" name="name" required>\n        <label for="email">Email:</label>\n        <input type="text" id="email" name="email" required>\n        <label for="height">Height (in cm):</label>\n        <input type="number" id="height" name="height" required>\n        <label for="weight">Weight (in kg):</label>\n        <input type="number" id="weight" name="weight" required>\n        <label for="chest">Chest (in cm):</label>\n        <input type="number" id="chest" name="chest" required>\n        <label for="waist">Waist (in cm):</label>\n        <input type="number" id="waist" name="waist" required>\n        <input type="submit" value="Submit">\n    </form>\n</body>\n</html>
